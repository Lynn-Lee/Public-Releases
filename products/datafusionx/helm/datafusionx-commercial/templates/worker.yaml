apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "datafusionx-commercial.fullname" . }}-worker
  labels:
    {{- include "datafusionx-commercial.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: worker
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: worker
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: worker
          image: {{ .Values.image.backend | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "-m", "celery", "-A", "app.worker.celery_app", "worker", "--loglevel=info"]
          envFrom:
            - configMapRef:
                name: {{ include "datafusionx-commercial.fullname" . }}-config
            - secretRef:
                name: {{ include "datafusionx-commercial.fullname" . }}-secret
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "datafusionx-commercial.fullname" . }}-secret
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: postgresql+asyncpg://datafusionx:$(POSTGRES_PASSWORD)@{{ include "datafusionx-commercial.fullname" . }}-postgres:5432/datafusionx
            - name: REDIS_URL
              value: redis://{{ include "datafusionx-commercial.fullname" . }}-redis:6379/0
          volumeMounts:
            - name: licenses
              mountPath: /app/licenses
      volumes:
        - name: licenses
          persistentVolumeClaim:
            claimName: {{ include "datafusionx-commercial.fullname" . }}-licenses
---
