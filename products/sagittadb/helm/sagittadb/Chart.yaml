apiVersion: v2
name: sagittadb
description: SagittaDB 矢准数据 — 企业级多引擎数据库管控平台
type: application
version: 1.0.5
appVersion: "1.0.5"

keywords:
  - database
  - sql-audit
  - dba
  - workflow

home: https://sagitta.loveai.asia
maintainers:
  - name: SagittaDB Team

dependencies:
  - name: postgresql
    version: "15.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: "19.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
