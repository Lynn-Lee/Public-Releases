apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sagittadb.fullname" . }}
  labels:
    {{- include "sagittadb.labels" . | nindent 4 }}
data:
  APP_ENV: {{ .Values.app.env | quote }}
  DEBUG: {{ .Values.app.debug | quote }}
  LOG_LEVEL: {{ .Values.app.logLevel | quote }}
  ACCESS_TOKEN_EXPIRE_MINUTES: {{ .Values.app.accessTokenExpireMinutes | quote }}
  REFRESH_TOKEN_EXPIRE_DAYS: {{ .Values.app.refreshTokenExpireDays | quote }}
  TENANT_ID: {{ .Values.app.tenantId | quote }}
  AI_PROVIDER: {{ .Values.app.aiProvider | quote }}
  PROMETHEUS_URL: {{ .Values.app.prometheusUrl | quote }}
  ALERTMANAGER_URL: {{ .Values.app.alertmanagerUrl | quote }}
  STORAGE_TYPE: {{ .Values.app.storageType | quote }}
  STORAGE_LOCAL_PATH: {{ .Values.app.storageLocalPath | quote }}
  LICENSE_SERVER_URL: {{ .Values.license.serverUrl | quote }}
  LICENSE_AUTO_REFRESH_ENABLED: {{ .Values.license.autoRefreshEnabled | quote }}
  LICENSE_ONLINE_GRACE_DAYS: {{ .Values.license.onlineGraceDays | quote }}
  LICENSE_RENEWAL_NOTIFY_DAYS: {{ .Values.license.renewalNotifyDays | quote }}
  LICENSE_TRIAL_DAYS: {{ .Values.license.trialDays | quote }}
  LICENSE_OFFLINE_CHALLENGE_TTL_MINUTES: {{ .Values.license.offlineChallengeTtlMinutes | quote }}
  LICENSE_ALLOW_LEGACY_LICENSE_IMPORT: {{ .Values.license.allowLegacyLicenseImport | quote }}
  APP_INTEGRITY_REQUIRED: {{ .Values.integrity.required | quote }}
  APP_INTEGRITY_MANIFEST: {{ .Values.integrity.manifest | quote }}
  APP_INTEGRITY_ROOT: {{ .Values.integrity.root | quote }}
