# SagittaDB Enterprise 客户部署包。
# 该文件由 CI 按具体商业版本渲染生成。

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sagittadb}
      POSTGRES_USER: ${POSTGRES_USER:-sagitta}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-sagitta}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required} --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    image: ghcr.io/lynn-lee/sagittadb-backend:2.0.0
    restart: always
    env_file: .env
    environment:
      APP_ENV: production
      DEBUG: "false"
      LOG_LEVEL: WARNING
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sagitta}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sagittadb}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-sagitta}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sagittadb}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - downloads:/app/downloads
      - licenses:/app/licenses
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  celery_worker:
    image: ghcr.io/lynn-lee/sagittadb-backend:2.0.0
    restart: always
    env_file: .env
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sagitta}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sagittadb}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - downloads:/app/downloads
      - licenses:/app/licenses
    command: >
      celery -A app.celery_app worker
      --concurrency=${CELERY_CONCURRENCY:-8}
      -Q default,execute,notify,archive,monitor
      --loglevel=warning
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery_app inspect ping -d celery@$$HOSTNAME | grep -q OK"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s

  celery_beat:
    image: ghcr.io/lynn-lee/sagittadb-backend:2.0.0
    restart: always
    env_file: .env
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sagitta}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sagittadb}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.celery_app beat --loglevel=warning
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep '[c]elery.*beat' >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    image: ghcr.io/lynn-lee/sagittadb-frontend:2.0.0
    restart: always
    depends_on:
      - backend
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${FRONTEND_PORT:-80}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  pg_data:
  redis_data:
  downloads:
  licenses:
