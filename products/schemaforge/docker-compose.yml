services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-schemaforge}
      POSTGRES_USER: ${POSTGRES_USER:-schemaforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-schemaforge} -d ${POSTGRES_DB:-schemaforge}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ${SCHEMAFORGE_API_IMAGE:?SCHEMAFORGE_API_IMAGE is required}
    env_file:
      - path: .env
        required: false
    environment:
      SCHEMAFORGE_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-schemaforge}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-schemaforge}
      SCHEMAFORGE_REDIS_URL: redis://redis:6379/0
      SCHEMAFORGE_APP_ENV: production
      SCHEMAFORGE_LICENSE_ENFORCEMENT_ENABLED: "true"
    volumes:
      - ./licenses:/data/schemaforge
      - ./release:/opt/schemaforge/release:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    image: ${SCHEMAFORGE_API_IMAGE:?SCHEMAFORGE_API_IMAGE is required}
    command: ["schemaforge-runtime", "worker"]
    env_file:
      - path: .env
        required: false
    environment:
      SCHEMAFORGE_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-schemaforge}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-schemaforge}
      SCHEMAFORGE_REDIS_URL: redis://redis:6379/0
      SCHEMAFORGE_APP_ENV: production
      SCHEMAFORGE_LICENSE_ENFORCEMENT_ENABLED: "true"
    volumes:
      - ./licenses:/data/schemaforge
      - ./release:/opt/schemaforge/release:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    image: ${SCHEMAFORGE_WEB_IMAGE:?SCHEMAFORGE_WEB_IMAGE is required}
    depends_on:
      - api

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${SCHEMAFORGE_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web

volumes:
  postgres_data:
