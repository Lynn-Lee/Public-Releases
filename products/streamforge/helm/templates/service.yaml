apiVersion: v1
kind: Service
metadata:
  name: streamforge-postgres
spec:
  selector:
    app: streamforge-postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: streamforge-backend
spec:
  selector:
    app: streamforge-backend
  ports:
    - port: {{ .Values.service.backendPort }}
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: streamforge-console
spec:
  type: ClusterIP
  selector:
    app: streamforge-console
  ports:
    - port: {{ .Values.service.consolePort }}
      targetPort: 80
